services:
  db:
    image: mysql:8.0
    container_name: mysql-despachos
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: despachos_db
      MYSQL_USER: despachos_user
      MYSQL_PASSWORD: despachos_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: springboot-despachos
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: db
      DB_PORT: 3306
      DB_NAME: despachos_db
      DB_USERNAME: despachos_user
      DB_PASSWORD: despachos_pass
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
