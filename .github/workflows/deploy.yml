name: CI/CD Back Despacho

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build -t despacho-api .

      - name: Tag image
        run: docker tag despacho-api:latest ${{ vars.ECR_REPO_URL }}:latest

      - name: Push image
        run: docker push ${{ vars.ECR_REPO_URL }}:latest

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REPO_URL: ${{ vars.ECR_REPO_URL }}
          DB_ENDPOINT: ${{ vars.DB_ENDPOINT }}
          DB_PORT: ${{ vars.DB_PORT }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        with:
          host: ${{ secrets.EC2_PUBLIC_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,AWS_REGION,ECR_REPO_URL,DB_ENDPOINT,DB_PORT,DB_NAME,DB_USERNAME,DB_PASSWORD
          script: |
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$(echo "$ECR_REPO_URL" | cut -d/ -f1)"
            docker pull "$ECR_REPO_URL:latest"
            docker stop despacho-api || true
            docker rm despacho-api || true
            docker run -d \
              --name despacho-api \
              --restart unless-stopped \
              -p 8081:8081 \
              -e DB_ENDPOINT="$DB_ENDPOINT" \
              -e DB_PORT="$DB_PORT" \
              -e DB_NAME="$DB_NAME" \
              -e DB_USERNAME="$DB_USERNAME" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              "$ECR_REPO_URL:latest" 
 
